name: srl-scale

services:
  redis:
    image: redis:8-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: mrl_media
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mrl_media"]
      interval: 5s
      timeout: 3s
      retries: 10

  schema:
    build:
      context: .
    command: ["pnpm", "db:push", "--force"]
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mrl_media
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
    environment:
      PORT: 3000
      TRUST_PROXY: "1"
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mrl_media
      STORAGE_DRIVER: database
      ADMIN_KEY: dev-admin
      WORKER_MODE: api
    command: ["pnpm", "exec", "tsx", "src/api/server.ts"]
    depends_on:
      redis:
        condition: service_healthy
      schema:
        condition: service_completed_successfully
    expose:
      - "3000"

  worker:
    build:
      context: .
    command: ["pnpm", "exec", "tsx", "src/worker/index.ts"]
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/mrl_media
      STORAGE_DRIVER: database
      ADMIN_KEY: dev-admin
    depends_on:
      redis:
        condition: service_healthy
      schema:
        condition: service_completed_successfully

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "3210:80"
    volumes:
      - ${NGINX_SCALE_CONF:-./scripts/nginx-scale.conf}:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
