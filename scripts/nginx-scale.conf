events {}

http {
  upstream api_pool {
    least_conn;
    server srl-scale-api-1:3000;
    server srl-scale-api-2:3000;
    server srl-scale-api-3:3000;
    server srl-scale-api-4:3000;
    server srl-scale-api-5:3000;
    server srl-scale-api-6:3000;
    server srl-scale-api-7:3000;
    server srl-scale-api-8:3000;
    server srl-scale-api-9:3000;
    server srl-scale-api-10:3000;
    server srl-scale-api-11:3000;
    server srl-scale-api-12:3000;
  }

  server {
    listen 80;

    location / {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_pass http://api_pool;
    }
  }
}
